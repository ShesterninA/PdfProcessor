services:
  postgres:
    image: postgres:17
    container_name: pdfprocessor-postgres
    environment:
      POSTGRES_DB: pdfprocessor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdfprocessor"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    container_name: pdfprocessor-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    user: root
    build:
      context: .
      dockerfile: PdfProcessor.API/Dockerfile
    container_name: pdfprocessor-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - pdf-storage:/app/uploads

  worker:
    user: root
    build:
      context: .
      dockerfile: PdfProcessor.Worker/Dockerfile
    container_name: pdfprocessor-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - pdf-storage:/app/uploads

volumes:
  postgres-data:
  pdf-storage: